<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Created – TruStone Financial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { barlow: ['Barlow', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#11304F', gray: '#666F77' },
            emerald: { DEFAULT: '#48B5B5' },
            accent: { orange: '#FEB060', 'orange-text': '#4D351D' },
            grayscale: { divider: '#DDDFE4', white: '#FFFFFF' },
            brand: { purple: '#4F46E5', 'purple-dark': '#4338CA' },
          },
        },
      },
    };
  </script>
  <style>
    * { font-family: 'Barlow', sans-serif; }

    /* Mobile frame wrapper */
    body {
      background: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-frame {
      width: 390px;
      min-height: 844px;
      background: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      border-radius: 40px;
    }

    /* Badge shine animation */
    @keyframes shine {
      0%   { transform: translateX(-120%) rotate(-45deg); }
      60%  { transform: translateX(300%) rotate(-45deg); }
      100% { transform: translateX(300%) rotate(-45deg); }
    }
    .shine-bar { animation: shine 2.8s ease-in-out infinite; }

    /* Subtle card entrance */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.55s ease both; }
    .animate-fade-up-delay { animation: fadeUp 0.55s ease 0.15s both; }
  </style>
</head>
<body>

<div class="phone-frame">

  <!-- ─── Header ───────────────────────────────────────── -->
  <header class="flex items-center justify-between px-5 py-4"
          style="background: linear-gradient(90deg,#4F46E5 0%,#4338CA 100%);">
    <!-- Logo -->
    <div class="flex items-center gap-2">
      <!-- Shield icon -->
      <svg width="28" height="34" viewBox="0 0 28 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 0L0 5.5V16.5C0 25.07 6.27 33.08 14 34C21.73 33.08 28 25.07 28 16.5V5.5L14 0Z"
              fill="white" fill-opacity="0.25"/>
        <path d="M14 2.5L2 7.3V16.5C2 23.9 7.44 30.8 14 31.9C20.56 30.8 26 23.9 26 16.5V7.3L14 2.5Z"
              fill="white" fill-opacity="0.15"/>
        <path d="M10 17.5L13 20.5L19 13.5" stroke="white" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <!-- Wordmark -->
      <div class="leading-none">
        <p class="text-white font-bold text-[11px] tracking-[0.12em] uppercase">TruStone</p>
        <p class="text-white/70 font-medium text-[7.5px] tracking-[0.18em] uppercase">Financial</p>
      </div>
    </div>
  </header>

  <!-- ─── Page body ─────────────────────────────────────── -->
  <main class="bg-white pb-28 pt-5 px-5">

    <!-- Card -->
    <div class="animate-fade-up rounded-2xl bg-white pt-8 pb-6 px-0"
         style="box-shadow:0 1.16px 26px rgba(34,38,65,.08),0 0.46px 9.8px rgba(34,38,65,.06),0 0.1px 3.5px rgba(34,38,65,.04);">

      <!-- ── Success badge + title ── -->
      <div class="flex flex-col items-center gap-4 px-6">

        <!-- Badge -->
        <div class="relative flex items-center justify-center w-[70px] h-[70px]">
          <!-- Star/seal background -->
          <svg width="70" height="70" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M35 3L41.5 14.6L54.8 10.2L54.8 24L66.4 30.5L60.9 42.1L68.6 52L58.1 57.5L57 70.7L44.4 67.4L35 76L25.6 67.4L13 70.7L11.9 57.5L1.4 52L9.1 42.1L3.6 30.5L15.2 24L15.2 10.2L28.5 14.6L35 3Z"
                  fill="#34D399"/>
            <!-- Slightly more star-like seal -->
          </svg>
          <!-- Solid seal -->
          <div class="absolute inset-0 rounded-full flex items-center justify-center"
               style="background: radial-gradient(circle,#4ade80 0%,#22c55e 60%,#16a34a 100%);
                      clip-path: polygon(50% 0%,61% 12%,74% 6%,76% 20%,90% 22%,86% 36%,98% 42%,90% 54%,97% 66%,84% 70%,82% 84%,69% 82%,61% 94%,50% 88%,39% 94%,31% 82%,18% 84%,16% 70%,3% 66%,10% 54%,2% 42%,14% 36%,10% 22%,24% 20%,26% 6%,39% 12%);">
          </div>
          <!-- Check icon -->
          <svg class="absolute" width="28" height="28" viewBox="0 0 24 24" fill="none"
               xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12L10 17L19 7" stroke="white" stroke-width="2.8"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <!-- Title -->
        <h1 class="text-[18px] font-bold text-[#11304F] leading-6 text-center whitespace-nowrap">
          Account created successfully
        </h1>
      </div>

      <!-- Divider -->
      <div class="my-5 h-px bg-[#DDDFE4] mx-6"></div>

      <!-- ── Account details ── -->
      <div class="flex gap-4 px-6">
        <div class="flex-1 flex flex-col gap-1">
          <p class="text-[12px] font-medium text-[#666F77] leading-4">Account No.</p>
          <p class="text-[14px] font-semibold text-[#11304F] leading-6">123456889</p>
        </div>
        <div class="flex-1 flex flex-col gap-1">
          <p class="text-[12px] font-medium text-[#666F77] leading-4">Date &amp; Time</p>
          <p class="text-[14px] font-semibold text-[#11304F] leading-6">Feb 6, 2026, 5:39 PM</p>
        </div>
      </div>

      <div class="my-5 h-px bg-[#DDDFE4] mx-6"></div>

      <!-- ── Fund account card ── -->
      <div class="animate-fade-up-delay px-6">
        <div class="relative bg-[#F4F6F8] rounded-2xl pt-7 pb-4 px-4">

          <!-- INSTANT badge -->
          <div class="absolute -top-3 left-4 overflow-hidden rounded-lg"
               style="background:#FEB060;">
            <div class="flex items-center gap-1 px-2 py-1 relative">
              <span class="text-[12px] font-medium text-[#4D351D] leading-[1.5]">INSTANT</span>
              <!-- Shine bar -->
              <div class="shine-bar absolute top-0 left-0 h-full w-[9px] -rotate-45 opacity-60"
                   style="background:rgba(255,255,255,0.55);filter:blur(1px);"></div>
            </div>
          </div>

          <!-- Card content row -->
          <div class="flex gap-3 items-start">

            <!-- Dollar icon circle -->
            <div class="relative shrink-0 flex items-center justify-center w-[42px] h-[42px] rounded-full"
                 style="background: linear-gradient(135deg,#e0f2f1 0%,#b2dfdb 100%);">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                   xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="#48B5B5" stroke-width="1.8"/>
                <path d="M12 6V18M9.5 15.5C9.5 15.5 10.5 17 12 17C13.66 17 15 15.88 15 14.5C15 13.12 13.66 12.5 12 12C10.34 12 9 11.38 9 10C9 8.62 10.34 7.5 12 7.5C13.5 7.5 14.5 8.5 14.5 8.5"
                      stroke="#48B5B5" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </div>

            <!-- Text -->
            <div class="flex flex-col gap-2 flex-1 min-w-0">
              <p class="text-[14px] font-bold text-[#11304F] leading-5">
                Fund Your Account instantly
              </p>
              <p class="text-[12px] font-medium text-[#666F77] leading-[18px]">
                Skip the 5-day bank transfer wait or mailing checks. Move money securely.
              </p>
            </div>
          </div>

          <!-- Add Funds button -->
          <button class="mt-4 w-full h-[42px] rounded-2xl flex items-center justify-center
                         text-white text-[16px] font-semibold leading-6
                         transition-all duration-150 active:scale-[0.97] hover:brightness-105"
                  style="background:#48B5B5;">
            Add Funds Now
          </button>

          <!-- Security note -->
          <div class="mt-2 flex items-center justify-center gap-1">
            <!-- Lock icon -->
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none"
                 xmlns="http://www.w3.org/2000/svg">
              <rect x="2" y="6" width="10" height="7" rx="1.5" stroke="#666F77" stroke-width="1.3"/>
              <path d="M4.5 6V4.5a2.5 2.5 0 015 0V6" stroke="#666F77" stroke-width="1.3"
                    stroke-linecap="round"/>
            </svg>
            <p class="text-[12px] text-[#666F77]">Encrypted &amp; Secure Digital Funding</p>
          </div>

        </div>
      </div>

      <!-- ── Back to dashboard ── -->
      <div class="mt-5 flex items-center justify-center">
        <button class="flex items-center gap-1.5 text-[14px] font-medium text-[#30989A]
                       leading-[18px] hover:underline transition-colors">
          Back to dashboard
        </button>
      </div>

    </div>
  </main>

  <!-- ─── Floating chat button ─────────────────────────── -->
  <div class="absolute bottom-6 right-5">
    <button class="w-[52px] h-[52px] rounded-full flex items-center justify-center shadow-lg
                   hover:brightness-105 transition-all active:scale-95"
            style="background:linear-gradient(135deg,#6366f1 0%,#4f46e5 100%);">
      <!-- Chat/support icon -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
           xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="10" r="5.5" stroke="white" stroke-width="1.6"/>
        <circle cx="12" cy="10" r="2" fill="white"/>
        <path d="M8.5 16.5C8.5 16.5 9.5 19 12 19C14.5 19 15.5 16.5 15.5 16.5"
              stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

</div>

</body>
</html>
